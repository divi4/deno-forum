<!doctype html>
<head>
    <title>Gen-AI Forum</title>
    <link rel="stylesheet" href="/views/assets/stylesheets/main.css" />
    <script type="module" src="/views/assets/scripts/main.js"></script>
</head>
    <div class="logonUser">
        <form id="signForm">
            <label for="signUsername">Username</label>
            <input
                class="signInput"
                type="text"
                id="signUsername"
                name="username"
                placeholder="John11"
                required
            />
            <label for="signPassword">Password</label>
            <input
                class="signInput"
                type="password"
                id="signPassword"
                name="password"
                required
            />
            <input class="signBtn" type="submit" value="Login/Sign-up" />
        </form>
    </div>
    <hr>
    <div class="heading">
        <h1>Posts</h1>
        <button class="createPost">New post</button>
    </div>
    <div class="posts"></div>
</body>
