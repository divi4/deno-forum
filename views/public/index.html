<!doctype html>
<head>
    <title>Gen-AI Forum</title>
    <link rel="stylesheet" href="stylesheets/main.css" />
    <script type="module" src="main.js"></script>
</head>
<body>
    <form id="signForm">
        <label for="signUsername">Username</label>
        <input
            class="signInput"
            type="text"
            id="signUsername"
            name="username"
            placeholder="John11"
            required
        />
        <label for="signPassword">Password</label>
        <input
            class="signInput"
            type="password"
            id="signPassword"
            name="password"
            required
        />
        <input class="signBtn" type="submit" value="Sign-up" />
    </form>
</body>
